<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Microbiology Department Dashboard</title>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    .btn-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding: 1.2rem 0.75rem;
      background: #ffffff;
      border-radius: 1rem;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      text-align: center;
      width: 100%;
      border: 1.5px solid #e5e7eb;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      user-select: none;
    }
    .dark .btn-card { background: #111827; border-color: #1f2937; }
    .btn-card:hover  { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(5,150,105,0.15); border-color: #6ee7b7; background: #f0fdf4; }
    .dark .btn-card:hover { border-color: #065f46; box-shadow: 0 8px 24px rgba(16,185,129,0.18); background: #0d1f17; }
    .btn-card:active { transform: scale(0.97); }
    .btn-icon {
      width: 3rem; height: 3rem; border-radius: 0.75rem;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .btn-label {
      font-size: 0.82rem; font-weight: 600;
      color: #111827; line-height: 1.3; word-break: break-word;
    }
    .dark .btn-label { color: #f3f4f6; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300">

  <!-- ── Header ───────────────────────────────────────── -->
  <header class="bg-emerald-800 dark:bg-emerald-950 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col sm:flex-row items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="text-4xl">🦠</div>
        <div>
          <h1 class="text-2xl sm:text-3xl font-bold text-white tracking-tight">Microbiology Department</h1>
          <p class="text-emerald-200 text-sm mt-0.5">Quick Access Dashboard</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span id="clock" class="text-emerald-100 text-sm font-mono bg-emerald-900 px-3 py-1.5 rounded-full"></span>
        <button onclick="toggleDark()" class="p-2 rounded-full bg-emerald-700 hover:bg-emerald-600 text-white transition" title="Toggle dark mode">
          <span id="dark-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Button Grid ──────────────────────────────────── -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="btn-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>

    <!-- shown only when every button has no URL -->
    <div id="empty-msg" class="hidden flex-col items-center justify-center py-24 text-center">
      <div class="text-6xl mb-4">🔗</div>
      <p class="text-lg font-semibold text-gray-400 dark:text-gray-500">No buttons configured yet</p>
      <p class="text-sm text-gray-400 dark:text-gray-600 mt-1">Fill in a URL in the BUTTONS list to show it here.</p>
    </div>
  </main>

  <footer class="text-center text-xs text-gray-400 dark:text-gray-600 py-6">
     &nbsp;&nbsp;   </footer>

<!-- ═══════════════════════════════════════════════════════════
     ✏️  EDIT YOUR 20 BUTTONS HERE
       url: ""            →  button is AUTO-HIDDEN
       url: "https://…"  →  button SHOWS & opens on click
     ═══════════════════════════════════════════════════════════ -->
<script>
const BUTTONS = [
  { id:1,  label:"A",   icon:"🔗", color:"blue",    url:"" },
  { id:2,  label:"Laboratory Portal",  icon:"🔗", color:"emerald", url:"" }, 
  { id:3,  label:"Student LMS",         icon:"📚", color:"purple",  url:"" },
  { id:4,  label:"Email / Webmail",     icon:"📧", color:"red",     url:"" },
  { id:5,  label:"PubMed / NCBI",       icon:"📄", color:"sky",     url:"" },
  { id:6,  label:"Google Scholar",      icon:"🎓", color:"yellow",  url:"" },
  { id:7,  label:"ASM Journals",        icon:"🧬", color:"green",   url:"" },
  { id:8,  label:"ResearchGate",        icon:"🔗", color:"teal",    url:"" },
  { id:9,  label:"ScienceDirect",       icon:"📰", color:"orange",  url:"" },
  { id:10, label:"NCBI BLAST",          icon:"🧪", color:"indigo",  url:"" },
  { id:11, label:"Micro Lis",           icon:"🦠", color:"pink",    url:"https://microbiologycchrc.github.io/sec-2/" },
  { id:12, label:"Laboratory Portal",   icon:"🔬", color:"lime",    url:"https://microbiologycchrc.github.io/sec-1/" },
  { id:13, label:"KEGG Pathways",       icon:"🗺️", color:"cyan",    url:"" },
  { id:14, label:"Sigma-Aldrich",       icon:"⚗️", color:"amber",   url:"" },
  { id:15, label:"Google Drive",        icon:"📁", color:"yellow",  url:"" },
  { id:16, label:"Google Meet",         icon:"📹", color:"green",   url:"" },
  { id:17, label:"Zoom",                icon:"🎥", color:"blue",    url:"" },
  { id:18, label:"Overleaf (LaTeX)",    icon:"✍️", color:"red",     url:"" },
  { id:19, label:"Button 19",           icon:"🔧", color:"gray",    url:"" },
  { id:20, label:"Button 20",           icon:"🔧", color:"gray",    url:"" },
];

// ── colour map ────────────────────────────────────────────────
const COLOR = {
  blue:    "bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300",
  emerald: "bg-emerald-100 dark:bg-emerald-900 text-emerald-600 dark:text-emerald-300",
  purple:  "bg-purple-100 dark:bg-purple-900 text-purple-600 dark:text-purple-300",
  red:     "bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-300",
  sky:     "bg-sky-100 dark:bg-sky-900 text-sky-600 dark:text-sky-300",
  yellow:  "bg-yellow-100 dark:bg-yellow-900 text-yellow-600 dark:text-yellow-300",
  green:   "bg-green-100 dark:bg-green-900 text-green-600 dark:text-green-300",
  teal:    "bg-teal-100 dark:bg-teal-900 text-teal-600 dark:text-teal-300",
  orange:  "bg-orange-100 dark:bg-orange-900 text-orange-600 dark:text-orange-300",
  indigo:  "bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-300",
  pink:    "bg-pink-100 dark:bg-pink-900 text-pink-600 dark:text-pink-300",
  lime:    "bg-lime-100 dark:bg-lime-900 text-lime-600 dark:text-lime-300",
  cyan:    "bg-cyan-100 dark:bg-cyan-900 text-cyan-600 dark:text-cyan-300",
  amber:   "bg-amber-100 dark:bg-amber-900 text-amber-600 dark:text-amber-300",
  gray:    "bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400",
};

// ── Render ────────────────────────────────────────────────────
function render() {
  const grid     = document.getElementById('btn-grid');
  const emptyMsg = document.getElementById('empty-msg');
  let visible    = 0;

  BUTTONS.forEach(b => {
    if (!b.url || !b.url.trim()) return; // auto-hide

    visible++;
    const btn = document.createElement('button');
    btn.className = 'btn-card';
    btn.title     = b.label;
    btn.onclick   = () => { window.location.href = b.url; };
    btn.innerHTML = `
      <div class="btn-icon ${COLOR[b.color] || COLOR.gray}">${b.icon}</div>
      <div class="btn-label">${b.label}</div>`;
    grid.appendChild(btn);
  });

  if (visible === 0) {
    emptyMsg.classList.remove('hidden');
    emptyMsg.classList.add('flex');
  }
}

// ── Dark mode ─────────────────────────────────────────────────
function toggleDark() {
  const html = document.documentElement;
  const icon = document.getElementById('dark-icon');
  if (html.classList.contains('dark')) {
    html.classList.remove('dark'); localStorage.theme = 'light'; icon.textContent = '🌙';
  } else {
    html.classList.add('dark');   localStorage.theme = 'dark';  icon.textContent = '☀️';
  }
}

// ── Clock ─────────────────────────────────────────────────────
(function tick() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  setTimeout(tick, 1000);
})();

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (document.documentElement.classList.contains('dark'))
    document.getElementById('dark-icon').textContent = '☀️';
  render();
});
</script>
</body>
</html>
